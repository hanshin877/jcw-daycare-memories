name: Deploy index.html to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy index.html to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          include_files: index.html
          publish_branch: gh-pages
          commit_message: "Deploy index.html [skip ci]"
